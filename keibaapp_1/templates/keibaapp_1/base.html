<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% block title %}前残り展開分析 | 中央競馬 重賞限定{% endblock %}</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      background: #f7f8fb;
      color: #222;
    }

    a { text-decoration: none; color: inherit; }

    /* =========================
    ヘッダー
    ========================= */
    .header {
      background: #111;
      color: #fff;
      padding: 16px 20px;
    }

    .headerInner {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .siteTitle {
      font-weight: 800;
      font-size: 18px;
    }

    .siteSub {
      font-size: 12px;
      color: #bbb;
    }

    .nav {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 14px;
    }

    .nav a {
      color: #ddd;
    }

    .nav a:hover {
      color: #fff;
    }

    /* =========================
    コンテンツ
    ========================= */
    .container {
      max-width: 1000px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .badge {
      display:inline-block;
      padding:2px 8px;
      border:1px solid #aaa;
      border-radius:999px;
      font-size:12px;
      margin-right:6px;
    }

    .meta { margin: 8px 0 16px; }

    table {
      border-collapse: collapse;
      width: 100%;
      background: #fff;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
    }

    th { background: #f6f6f6; }

    .card {
      border:1px solid #ddd;
      border-radius:12px;
      padding:16px;
      margin:16px 0;
      background:#fff;
    }

    /* =========================
    フッター
    ========================= */
    .footer {
      margin-top: 40px;
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: #777;
    }

  </style>
</head>

<body>

  <!-- =========================
  ヘッダー
  ========================= -->
  <header class="header">
    <div class="headerInner">

      <div>
        <div class="siteTitle">前残り展開分析</div>
        <div class="siteSub">中央競馬 重賞限定 / 4角位置から前残りを読む</div>
      </div>

      <nav class="nav">
        <a href="/">無料分析</a>
        <a href="/top/">上位3頭</a>
        <a href="/races/">重賞一覧</a>
        <a href="/about/">ロジック</a>
      </nav>

    </div>
  </header>

  <!-- =========================
  コンテンツ
  ========================= -->
  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <!-- =========================
  フッター
  ========================= -->
  <footer class="footer">
    前残り展開分析｜4角位置・脚質・ペースから前で残る馬を整理するサイト<br>
    ※本サイトは情報提供を目的としており、馬券購入を推奨するものではありません。
  </footer>

</body>
</html>
